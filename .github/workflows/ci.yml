name: CI

# Runs the plugin test suite, installed-layout smoke, repo-owned plugin
# validator, and the same RQML gates that local hooks surface. The hook tests
# use a fake rqml binary, while the CI parity gates invoke @rqml/cli directly.
#
# Triggered on pull_request and main pushes so CI remains the unconditional
# backstop when hooks fail open or a local tool path bypasses PreToolUse.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test
      - run: node scripts/validate-plugin.mjs
      - run: npx -y @rqml/cli check
      - run: npx -y @rqml/cli check --strictness strict
